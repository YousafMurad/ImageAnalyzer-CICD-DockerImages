name: Image AI Pipeline

on:
  push:
    branches:
      - main

jobs:
  image-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install Tesseract engine binary so LayoutLM can fall back on text bounding boxes
      - name: Install System OCR Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v2-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-v2-${{ runner.os }}-

      # Updated the key to 'hf-models-layoutlm-v2-'
      - name: Cache Hugging Face Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-layoutlm-v2-${{ runner.os }}-${{ hashFiles('scripts/process_image.py') }}
          restore-keys: |
            hf-models-layoutlm-v2-${{ runner.os }}-

      # Light-weight CPU mode configuration for rapid runner setups
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt

      - name: Run AI Script
        env:
          HF_HUB_DISABLE_IMPLICIT_TOKEN: "1"
        run: python scripts/process_image.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-results
          path: output/
name: Invoice AI Pipeline

on:
  push:
    branches:
      - main

jobs:
  ollama-test:
    runs-on: ubuntu-latest

    env:
      OLLAMA_URL: http://localhost:11434

    steps:
      - uses: actions/checkout@v4

      - name: Show Docker Version
        run: docker --version

      - name: Start Ollama
        run: |
          docker run -d \
            --name ollama \
            -p 11434:11434 \
            ollama/ollama

      - name: Wait for Ollama
        run: |
          echo "Waiting for Ollama..."

          for i in {1..30}; do
            if curl -s http://localhost:11434 > /dev/null; then
              echo "Ollama is ready!"
              exit 0
            fi

            sleep 2
          done

          docker logs ollama
          exit 1

      - name: Pull Vision Model
        run: |
          docker exec ollama ollama pull llama3.2-vision

      - name: Show Installed Models
        run: |
          docker exec ollama ollama list

      - name: Test Ollama Text Generation
        run: |
          curl http://localhost:11434/api/generate \
          -d '{
            "model":"llama3.2-vision",
            "prompt":"Say Hello",
            "stream":false
          }'

      - name: Show Repository Files
        run: |
          pwd
          ls -R

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
            python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
            path: ~/.cache/pip
            key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

       - name: Install Requirements
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      - name: Process Image
        run: python scripts/process_image.py

      - name: Show Ollama Logs
        if: always()
        run: docker logs ollama

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-result
          path: output/
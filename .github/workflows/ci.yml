name: Image AI Pipeline

on:
  push:
    branches:
      - main

jobs:
  image-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 1. Cache python dependencies (including heavy torch packages)
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # 2. Cache Hugging Face models so they don't re-download every build
      - name: Cache Hugging Face Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-${{ hashFiles('scripts/process_image.py') }}
          restore-keys: |
            hf-models-${{ runner.os }}-

      # 3. Use the light CPU version of PyTorch to drastically speed up install times
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt

      - name: Show Repository Files
        run: |
          pwd
          ls -R

      - name: Run AI Script
        run: python scripts/process_image.py

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-results
          path: output/